name: ci

on:
  push:
    paths:
      - "**"
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: eval suite (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["20", "22"]
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - run: npm ci || npm install
      - run: npm test
